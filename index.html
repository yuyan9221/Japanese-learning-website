<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語學習 - Gemini 版</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Noto+Sans+TC:wght@300;400;500;600&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0; --white: #ffffff; --border: #e4dfd6;
  --accent: #e8534a; --accent2: #3a7bd5; --accent3: #2ecc71;
  --yellow: #f5a623; --text: #1c1917; --muted: #9c9488;
  --radius: 16px; --font-jp: 'Zen Kaku Gothic New', serif; --font-ui: 'Noto Sans TC', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;}
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}

/* LOGIN */
#loginScreen.active{display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);}
.login-box{background:var(--white);border-radius:24px;padding:40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.1);}
.login-logo{font-family:var(--font-jp);font-size:2.4rem;font-weight:900;color:var(--accent);margin-bottom:4px;}
.login-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:12px;outline:none;}
.login-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;}

/* APP UI */
.topbar{position:sticky;top:0;z-index:100;background:rgba(247,245,240,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 20px;}
.topbar-logo{font-family:var(--font-jp);font-weight:900;color:var(--accent);font-size:1.3rem;}
.nav-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;}
.nav-tab{flex:1;padding:14px;border:none;background:transparent;cursor:pointer;font-size:0.85rem;color:var(--muted);border-bottom:2px solid transparent;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.page{display:none;padding:20px;max-width:800px;margin:0 auto;}
.page.active{display:block;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}

/* 這裡省略部分重複的 CSS 樣式以節省空間，保留核心功能樣式 */
.flashcard-wrap{perspective:1000px;margin:20px auto;max-width:340px;}
.flashcard{width:100%;height:200px;position:relative;transform-style:preserve-3d;transition:transform 0.5s;cursor:pointer;}
.flashcard.flipped{transform:rotateY(180deg);}
.fc-front, .fc-back{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;background:white;border:1.5px solid var(--border);border-radius:20px;padding:20px;text-align:center;}
.fc-back{transform:rotateY(180deg);background:#f0f7ff;}
.fc-jp{font-size:2rem;font-weight:700;margin-bottom:10px;}
.fc-zh{font-size:1.4rem;color:var(--accent2);font-weight:600;}

/* MODAL & TOAST */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:200;}
.modal-overlay.open{display:flex;}
.modal-box{background:white;padding:24px;border-radius:20px;width:90%;max-width:400px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:white;padding:10px 20px;border-radius:100px;transition:0.3s;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">日本語</div>
    <div class="login-sub">Japanese Learning App</div>
    <input class="login-input" id="loginName" type="text" placeholder="你的名字" />
    <input class="login-input" id="loginPass" type="password" placeholder="自訂密碼" />
    <button class="login-btn" onclick="doLogin()">開始學習 →</button>
  </div>
</div>

<div class="screen" id="appScreen">
  <div class="topbar">
    <div class="topbar-logo">日本語</div>
    <div class="topbar-user">
      <span id="topbarName" style="margin-right:10px; font-size:0.8rem;"></span>
      <button onclick="openSettings()" style="border:none; background:none; cursor:pointer;">⚙️ 設定</button>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('vocab')">🃏 單字卡</button>
    <button class="nav-tab" onclick="switchTab('article')">📖 文章</button>
    <button class="nav-tab" onclick="switchTab('zh2jp')">✍️ 中翻日</button>
  </div>

  <div class="page active" id="page-vocab">
    <div class="card">
      <h3>生成日文單字 (N5-N1)</h3>
      <button class="login-btn" style="margin-top:10px;" onclick="genWordsForCat()">✦ 點擊讓 Gemini 出 10 個單字</button>
    </div>
    <div id="vocabFlash" style="display:none;">
      <div class="flashcard-wrap">
        <div class="flashcard" id="theFlashcard" onclick="this.classList.toggle('flipped')">
          <div class="fc-front">
            <div class="fc-jp" id="fcFrontJp">準備中...</div>
            <div id="fcFrontReading" style="color:gray;"></div>
          </div>
          <div class="fc-back">
            <div class="fc-zh" id="fcBackZh"></div>
            <div id="fcBackEx" style="font-size:0.9rem; margin-top:10px;"></div>
          </div>
        </div>
      </div>
      <button class="login-btn" style="background:var(--accent2);" onclick="nextCard()">下一個 →</button>
    </div>
  </div>

  </div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <h3>⚙️ API 設定</h3>
    <p style="font-size:0.8rem; color:gray; margin:10px 0;">請貼上你的 Gemini API Key (AIza...)</p>
    <input class="login-input" id="apiKeyInput" type="password" placeholder="在此貼上 Key" />
    <button class="login-btn" onclick="saveApiKey()">儲存並關閉</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB = {
  get(k){ return JSON.parse(localStorage.getItem(k)); },
  set(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
};

let currentUser = null;
let wordList = [];
let currentIdx = 0;

// --- API 核心：Gemini 心臟移植 ---
async function callAI(system, user) {
  const key = localStorage.getItem('gemini_api_key');
  if (!key) { openSettings(); throw new Error('no_key'); }

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`;
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: `指令：${system}\n內容：${user}` }] }]
    })
  });

  const data = await response.json();
  let text = data.candidates[0].content.parts[0].text;
  return text.replace(/```json|```/g, '').trim();
}

// --- 登入與基礎功能 ---
function doLogin() {
  const name = document.getElementById('loginName').value;
  if(!name) return alert('請輸入名字');
  currentUser = name;
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  document.getElementById('topbarName').textContent = name + ' さん';
}

function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
}

function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value;
  localStorage.setItem('gemini_api_key', key);
  document.getElementById('settingsModal').classList.remove('open');
  showToast('API Key 已儲存');
}

// --- 單字卡邏輯 ---
async function genWordsForCat() {
  showToast('Gemini 思考中...');
  try {
    const sys = "你是一位日文老師。請隨機產生 10 個 N5 程度的日文單字。請只輸出 JSON 陣列格式：[{\"jp\":\"日文\",\"reading\":\"假名\",\"zh\":\"中文\",\"example\":\"例句\"}]";
    const res = await callAI(sys, "開始生成");
    wordList = JSON.parse(res);
    currentIdx = 0;
    showCard();
    document.getElementById('vocabFlash').style.display = 'block';
  } catch(e) { showToast('發生錯誤，請檢查 Key'); }
}

function showCard() {
  const w = wordList[currentIdx];
  document.getElementById('fcFrontJp').textContent = w.jp;
  document.getElementById('fcFrontReading').textContent = w.reading;
  document.getElementById('fcBackZh').textContent = w.zh;
  document.getElementById('fcBackEx').textContent = w.example;
  document.getElementById('theFlashcard').classList.remove('flipped');
}

function nextCard() {
  currentIdx = (currentIdx + 1) % wordList.length;
  showCard();
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 初始化
window.onload = () => {
  document.getElementById('loginScreen').classList.add('active');
  const savedKey = localStorage.getItem('gemini_api_key');
  if(savedKey) document.getElementById('apiKeyInput').value = savedKey;
};
</script>
</body>
</html>
